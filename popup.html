<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div id="app">
			<div id="loading-state" class="state hidden">
				<div class="spinner"></div>
				<p>Loading...</p>
			</div>

			<div id="auth-state" class="state">
				<div class="auth-container">
					<h1>Haus Search</h1>
					<p class="tagline">Quick Add Extension</p>

					<div id="login-form" class="auth-form">
						<h2>Login</h2>
						<form id="login-submit">
							<div class="form-group">
								<label for="login-email">Email</label>
								<input
									type="email"
									id="login-email"
									placeholder="your@email.com"
									required
								/>
							</div>
							<div class="form-group">
								<label for="login-password">Password</label>
								<input
									type="password"
									id="login-password"
									placeholder="Password"
									required
								/>
							</div>
							<button type="submit" class="btn-primary">
								Login
							</button>
						</form>
						<p id="login-error" class="error-message"></p>
					</div>

					<div id="no-search-message" class="info-message hidden">
						<p>
							You're not part of an active Haus Search yet. Please
							log in to your Haus Search account and create or
							join one first.
						</p>
						<button id="logout-btn" class="btn-secondary">
							Logout
						</button>
					</div>
				</div>
			</div>

			<div id="add-lead-state" class="state hidden">
				<div class="add-lead-container">
					<div class="lead-header">
						<h2>Add Property Lead</h2>
						<button
							id="logout-btn-lead"
							class="btn-icon"
							title="Logout"
						>
							×
						</button>
					</div>

					<form id="add-lead-form">
						<div class="form-group">
							<label for="lead-nickname">Property Nickname</label>
							<input
								type="text"
								id="lead-nickname"
								placeholder="e.g. Victorian 3-bed"
								required
							/>
						</div>

						<div class="form-group">
							<label for="lead-address">Address</label>
							<input
								type="text"
								id="lead-address"
								placeholder="Full address"
								required
							/>
						</div>

						<div class="form-group">
							<label for="lead-url">Listing URL</label>
							<input
								type="url"
								id="lead-url"
								placeholder="https://..."
								required
							/>
						</div>

						<div class="form-group">
							<label for="lead-tags"
								>Tags (comma separated)</label
							>
							<input
								type="text"
								id="lead-tags"
								placeholder="e.g. modern, garden, parking"
							/>
						</div>

						<div class="form-group">
							<label for="lead-notes">Notes</label>
							<textarea
								id="lead-notes"
								placeholder="Add any notes..."
								rows="3"
							></textarea>
						</div>

						<div class="form-actions">
							<button
								type="button"
								id="auto-detect-btn"
								class="btn-secondary"
							>
								Auto-detect
							</button>
							<button type="submit" class="btn-primary">
								Add Lead
							</button>
						</div>
					</form>

					<p id="add-lead-error" class="error-message"></p>
					<p id="add-lead-success" class="success-message hidden"></p>
				</div>
			</div>
		</div>

		<script src="config.js"></script>
		<script src="auth.js"></script>
		<script src="popup.js"></script>
	</body>
</html>
